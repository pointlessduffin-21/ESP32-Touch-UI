; touch_test — standalone touch verification project
; Reuses display/touch drivers from ../src/ via CMakeLists.txt

[platformio]
default_envs = touch-test

[env:touch-test]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board     = esp32-p4-evboard
framework = espidf

upload_port   = /dev/cu.usbmodem1101
monitor_port  = /dev/cu.usbmodem1101
monitor_speed = 115200
upload_speed  = 460800

build_flags =
    -DDISPLAY_WIDTH=800
    -DDISPLAY_HEIGHT=1280
    -DLV_CONF_INCLUDE_SIMPLE
    -DLOG_LOCAL_LEVEL=ESP_LOG_INFO
    -DCONFIG_LOG_DEFAULT_LEVEL=3

board_build.partitions             = partitions.csv
board_build.esp-idf.sdkconfig_path    = sdkconfig
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults
