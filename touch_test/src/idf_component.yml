## idf_component.yml — touch_test, same deps as parent project

dependencies:
  idf: ">=5.3.0"

  ## MIPI-DSI panel driver for JD9365
  espressif/esp_lcd_ek79007:
    version: ">=2.0.0,<3.0.0"

  ## Provides esp_lcd_touch base interface (esp_lcd_touch.h)
  espressif/esp_lcd_touch_gt911:
    version: ">=1.0.0,<2.0.0"

  ## LVGL <-> esp_lcd bridge
  espressif/esp_lvgl_port:
    version: ">=2.3.0,<3.0.0"

  ## LVGL v9
  lvgl/lvgl:
    version: ">=9.1.0,<10.0.0"
    rules:
      - if: "idf_version >= 5.0"
