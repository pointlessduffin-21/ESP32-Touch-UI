<!--
  vehicle_top.svg — Top-down car silhouette for dashboard center panel.

  Usage in SquareLine Studio:
    1. Convert this SVG to a PNG (recommended: 80×160px at 2x = 160×320 for HDPI)
    2. Import the PNG into SquareLine Studio via Assets panel
    3. Place as lv_img widget named "VehicleImg" in the center panel
    4. Set image recolor to #CCCCCC (silver/grey) to match the reference design

  Color: silver body (#C0C0C0 fill), subtle highlight on roof, transparent background
  Dimensions: 80w × 160h (portrait orientation, top of SVG = front of car)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 160" width="80" height="160">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#888888"/>
      <stop offset="40%"  stop-color="#d0d0d0"/>
      <stop offset="60%"  stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a2a3a" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#2a4060" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a2a3a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Car body outline -->
  <path d="
    M 28,8
    Q 20,8 16,14
    L 12,30
    Q 10,36 10,50
    L 10,115
    Q 10,128 14,134
    L 16,148
    Q 18,155 28,155
    L 52,155
    Q 62,155 64,148
    L 66,134
    Q 70,128 70,115
    L 70,50
    Q 70,36 68,30
    L 64,14
    Q 60,8 52,8
    Z
  " fill="url(#bodyGrad)" stroke="#555555" stroke-width="1"/>

  <!-- Front bumper -->
  <path d="M 22,8 Q 40,4 58,8 L 56,14 Q 40,10 24,14 Z"
        fill="#707070" stroke="#444444" stroke-width="0.5"/>

  <!-- Rear bumper -->
  <path d="M 22,152 Q 40,156 58,152 L 56,148 Q 40,152 24,148 Z"
        fill="#707070" stroke="#444444" stroke-width="0.5"/>

  <!-- Front windshield -->
  <path d="M 24,32 Q 40,27 56,32 L 54,52 Q 40,48 26,52 Z"
        fill="url(#glassGrad)" opacity="0.85"/>

  <!-- Rear windshield -->
  <path d="M 26,108 Q 40,104 54,108 L 56,128 Q 40,133 24,128 Z"
        fill="url(#glassGrad)" opacity="0.75"/>

  <!-- Roof panel / cabin -->
  <rect x="20" y="52" width="40" height="56" rx="4"
        fill="#b0b0b0" stroke="#666666" stroke-width="0.5"/>

  <!-- Roof highlight -->
  <rect x="26" y="56" width="28" height="48" rx="3"
        fill="#d8d8d8" opacity="0.4"/>

  <!-- Front headlights -->
  <ellipse cx="20" cy="18" rx="6" ry="3" fill="#e0e8ff" opacity="0.9"/>
  <ellipse cx="60" cy="18" rx="6" ry="3" fill="#e0e8ff" opacity="0.9"/>

  <!-- Rear taillights -->
  <ellipse cx="20" cy="143" rx="6" ry="3" fill="#ff3030" opacity="0.8"/>
  <ellipse cx="60" cy="143" rx="6" ry="3" fill="#ff3030" opacity="0.8"/>

  <!-- Left side mirror -->
  <path d="M 10,44 Q 6,46 6,52 L 10,52 Z"
        fill="#888888" stroke="#555555" stroke-width="0.5"/>

  <!-- Right side mirror -->
  <path d="M 70,44 Q 74,46 74,52 L 70,52 Z"
        fill="#888888" stroke="#555555" stroke-width="0.5"/>

  <!-- Wheel arches (subtle indents) -->
  <!-- Front-left -->
  <path d="M 10,58 Q 6,66 6,75 Q 6,84 10,92" fill="none" stroke="#444444" stroke-width="1.5"/>
  <!-- Front-right -->
  <path d="M 70,58 Q 74,66 74,75 Q 74,84 70,92" fill="none" stroke="#444444" stroke-width="1.5"/>
  <!-- Rear-left -->
  <path d="M 10,100 Q 6,108 6,117 Q 6,126 10,134" fill="none" stroke="#444444" stroke-width="1.5"/>
  <!-- Rear-right -->
  <path d="M 70,100 Q 74,108 74,117 Q 74,126 70,134" fill="none" stroke="#444444" stroke-width="1.5"/>

  <!-- Door line crease -->
  <line x1="10" y1="80" x2="70" y2="80" stroke="#707070" stroke-width="0.5" opacity="0.6"/>
</svg>
