; ESP32 Touch UI — Automotive Dashboard
; Target: JC8012P4A1C_I_W_Y (ESP32-P4 + 10.1" 800x1280 JD9365 MIPI-DSI)
;   Display  : 800x1280 IPS, JD9365DA-H3 driver (MIPI-DSI 2-lane, 1500Mbps)
;   Touch    : GSL3680 capacitive, I2C_NUM_1, SDA=GPIO7, SCL=GPIO8
;   Backlight: GPIO23
;   Framework: ESP-IDF v5.3+ (Arduino NOT supported on P4)

[platformio]
default_envs = esp32-p4-ev

[env:esp32-p4-ev]
; ESP-IDF 5.3.2 — correct for ECO2 silicon (ROM: esp32p4-eco2-20240710)
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
board     = esp32-p4-evboard
framework = espidf

; ── Serial / upload ───────────────────────────────────────────────────────────
upload_port   = /dev/cu.usbmodem1101
monitor_port  = /dev/cu.usbmodem1101
monitor_speed = 115200
upload_speed  = 460800

; ── Build flags ───────────────────────────────────────────────────────────────
build_flags =
    -DDISPLAY_WIDTH=800
    -DDISPLAY_HEIGHT=1280

    ; LVGL config location
    -DLV_CONF_INCLUDE_SIMPLE

    ; Log verbosity
    -DLOG_LOCAL_LEVEL=ESP_LOG_INFO
    -DCONFIG_LOG_DEFAULT_LEVEL=3

; ── Partition table ───────────────────────────────────────────────────────────
board_build.partitions = partitions.csv

; ── Source paths ──────────────────────────────────────────────────────────────
; src/ is included automatically; lcd/ and touch/ are subdirs within src/
; ui/ and ui/assets/ are outside src/ so must be listed explicitly
build_src_filter =
    +<*>
    +<lcd/*.c>
    +<touch/*.c>
    +<../ui/*.c>
    +<../ui/assets/*.c>

; ── sdkconfig ─────────────────────────────────────────────────────────────────
board_build.esp-idf.sdkconfig_path    = sdkconfig
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults
